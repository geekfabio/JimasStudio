services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: jimas-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      APP_NAME: "${APP_NAME:-JIMAS}"
      APP_ENV: production
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL}"
      APP_LOCALE: "${APP_LOCALE:-pt}"
      APP_FALLBACK_LOCALE: "${APP_FALLBACK_LOCALE:-en}"
      APP_FAKER_LOCALE: "${APP_FAKER_LOCALE:-pt_PT}"
      APP_MAINTENANCE_DRIVER: file
      BCRYPT_ROUNDS: "${BCRYPT_ROUNDS:-12}"
      LOG_CHANNEL: "${LOG_CHANNEL:-stderr}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      SESSION_DRIVER: database
      SESSION_LIFETIME: "${SESSION_LIFETIME:-120}"
      SESSION_ENCRYPT: "${SESSION_ENCRYPT:-false}"
      SESSION_PATH: /
      SESSION_DOMAIN: "${SESSION_DOMAIN:-null}"
      BROADCAST_CONNECTION: log
      FILESYSTEM_DISK: local
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      MAIL_MAILER: "${MAIL_MAILER:-log}"
      MAIL_HOST: "${MAIL_HOST}"
      MAIL_PORT: "${MAIL_PORT}"
      MAIL_USERNAME: "${MAIL_USERNAME}"
      MAIL_PASSWORD: "${MAIL_PASSWORD}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS}"
      MAIL_FROM_NAME: "${MAIL_FROM_NAME}"
      VITE_APP_NAME: "${APP_NAME:-JIMAS}"
    volumes:
      - jimas-storage:/var/www/html/storage
      - jimas-database:/var/www/html/database
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  jimas-storage:
  jimas-database:
